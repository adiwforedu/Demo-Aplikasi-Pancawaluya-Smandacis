<body class="bg-slate-50 min-h-screen text-slate-800 font-sans pb-10 selection:bg-blue-200">

  <div id="root"></div>

  <!-- BINDING & MOCKUP DATA LOKAL -->
  <script>
    const { useState, useEffect, useMemo, useRef } = React;

    // DEMO DATA 
    // Konfigurasi API
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwGt20bxq_IH7IL3CzjcaQ9566FGSzzkjfN5O44316KQHtwze56DTabQwb9Us3fW0nz/exec";
    let cachedSiswa = [];

    const apiCall = async (action, payload = {}) => {
      if (action === 'LOGIN_ADMIN') {
        if (payload.nip === 'admin') return { success: true, user: { nip: 'admin', nama: 'Admin SMANDACIS', role: 'Admin' } };
        if (payload.nip === 'GTK' && payload.password === 'GTK123') return { success: true, user: { nip: 'GTK', nama: 'Guru / Tenaga Kependidikan', role: 'GTK' } };
      }
      if (action === 'LOGIN_SISWA') {
        if (cachedSiswa.length === 0) {
          const res = await apiCall('GET_MASTER_DATA');
          if (res.success) cachedSiswa = res.siswa;
        }
        const s = cachedSiswa.find(x => x.NISN === payload.nisn);
        if (s) return { success: true, user: { nisn: s.NISN, nama: s.Nama, kelas: s.Kelas, role: 'Siswa' } };
        return { success: false, message: 'NISN tidak ditemukan di Database.' };
      }
      if (action === 'GET_KATEGORI') {
        const res = await apiCall('GET_MASTER_DATA');
        return { success: res.success, kategori: res.kategori || [] };
      }
      if (action === 'GET_SISWA_HISTORY') {
        const res = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'GET_ALL_RECORDS', payload: {} })
        }).then(r => r.json()).catch(() => ({ success: false }));
        if (res.success) {
          const studentName = cachedSiswa.find(x => x.NISN === payload.nisn)?.Nama || payload.nisn;
          const history = (res.records || []).filter(d => d.nama === studentName);
          return { success: true, data: history };
        }
        return { success: false, data: [] };
      }
      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ action, payload })
        });
        const data = await response.json();

        if (action === 'GET_MASTER_DATA' && data.success) {
          cachedSiswa = data.siswa;
          if (data.kategori) {
            data.kategori.forEach((k, idx) => {
              k.ID = k.ID || ('KAT' + idx);
              if (k.Jenis && k.Jenis.toLowerCase().includes('prestasi')) k.Jenis = 'Prestasi';
              else k.Jenis = 'Pelanggaran';
            });
          }
        }

        if (action === 'SUBMIT_RECORDS' && data.success) {
          let maxPoin = 0;
          if (payload.mode === 'masal') {
            maxPoin = Math.abs(parseInt(payload.kategori.Poin));
          } else if (payload.records) {
            maxPoin = payload.records.reduce((acc, r) => acc + Math.abs(parseInt(r.poin)), 0);
          }
          let waMsg = "";
          if (maxPoin >= 75) waMsg = "\n\n🔔 Notifikasi WhatsApp (Simulasi) dikirim ke Guru BK!";
          else if (maxPoin >= 50) waMsg = "\n\n🔔 Notifikasi WhatsApp (Simulasi) dikirim ke Wali Kelas!";

          data.message = data.message + waMsg;
        }

        return data;
      } catch (err) {
        return { success: false, message: 'Koneksi Server Gagal: ' + err.toString() };
      }
    };
  </script>

  <script type="text/babel">
    function App() {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        try {
          const savedUser = localStorage.getItem('gapura_user_v9');
          if (savedUser && savedUser !== 'undefined') setUser(JSON.parse(savedUser));
        } catch (e) { }
        setLoading(false);
      }, []);

      const handleLogin = (u) => { setUser(u); localStorage.setItem('gapura_user_v9', JSON.stringify(u)); };
      const handleLogout = () => { setUser(null); localStorage.removeItem('gapura_user_v9'); };

            </div>

            <form onSubmit={handleSubmit} className="space-y-5">

                  </div>
                </>
              ) : (
                <div>
                  <label className="block text-xs uppercase tracking-wider mb-2 text-slate-500 font-bold">NISN / NIS</label>
                  <input type="text" required value={nisn} onChange={e => setNisn(e.target.value)} className="w-full px-5 py-4 rounded-2xl bg-slate-50 border border-slate-200 text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white text-center text-xl tracking-widest font-mono transition-all" placeholder="Masukkan NISN..." />
                </div>

              {error && <div className="text-red-700 text-sm bg-red-50 border border-red-200 p-4 rounded-2xl flex items-start gap-3"><i className="fa-solid fa-triangle-exclamation mt-0.5 text-red-500"></i> <p>{error}</p></div>}

                {loading ? 'Memverifikasi...' : <><span className="tracking-wide">Masuk Dashboard</span> <i className="fa-solid fa-chevron-right"></i></>}
              </button>
            </form>
          </div>
        </div>
      );
    }

    function getInitialKategori() {
      let aprePart = rawPDFText.substring(rawPDFText.indexOf('SKOR APRESIASI 1'), rawPDFText.indexOf('SKOR PELANGGARAN'));
      let pelanggaranPart = rawPDFText.substring(rawPDFText.indexOf('SKOR PELANGGARAN 1'));
      let cats = [];
      let idCounter = 1;
      function parsePart(text, type) {
        let regex = /(\d+)\s+(.*?)\s+(\d+)(?=\s+\d+\s+|$)/g;
        let match;
        while ((match = regex.exec(text)) !== null) {
          let uraian = match[2].trim().replace(/\s+/g, ' ');
          let skor = parseInt(match[3]);
          let poinStr = type === 'Prestasi' ? skor.toString() : '-' + skor.toString();
          let group = type === 'Prestasi' ? 'Apresiasi Karakter' : 'Pelanggaran Ketertiban';
          cats.push({
            ID: (type === 'Prestasi' ? 'A' : 'V') + idCounter++,
            Group: group, Jenis: type, NamaKategori: uraian.length > 50 ? uraian.substring(0, 50) + '...' : uraian,
            Poin: poinStr, Kriteria: 'Umum', Desc: uraian
          });
        }
      }
      parsePart(aprePart, 'Prestasi');
      idCounter = 1;
      parsePart(pelanggaranPart, 'Pelanggaran');
      return cats;
    }

    function PengaturanPoin({ masterData, setMasterData }) {
      const [kategoriList, setKategoriList] = useState(masterData.kategori || []);
      const [showModal, setShowModal] = useState(false);
      const [password, setPassword] = useState('');
      const [newKat, setNewKat] = useState({ NamaKategori: '', Poin: '', Jenis: 'Pelanggaran', Group: 'Pelanggaran Ketertiban' });
      const [saving, setSaving] = useState(false);

      useEffect(() => setKategoriList(masterData.kategori || []), [masterData.kategori]);

      const handleAdd = () => {
        if (!newKat.NamaKategori || !newKat.Poin) return alert('Isi nama dan poin!');
        const isApresiasi = newKat.Jenis === 'Prestasi';
        const newItem = {
          ID: (isApresiasi ? 'A' : 'V') + Date.now(),
          Group: newKat.Group, Jenis: newKat.Jenis,
          NamaKategori: newKat.NamaKategori,
          Poin: isApresiasi ? Math.abs(newKat.Poin).toString() : '-' + Math.abs(newKat.Poin).toString(),
          Kriteria: 'Umum', Desc: newKat.NamaKategori
        };

        const sortedList = [...kategoriList, newItem].sort((a, b) => {
          if (a.Jenis !== b.Jenis) return a.Jenis === 'Prestasi' ? -1 : 1;
          return Math.abs(parseInt(a.Poin)) - Math.abs(parseInt(b.Poin));
        });

        setKategoriList(sortedList);
        setNewKat({ NamaKategori: '', Poin: '', Jenis: 'Pelanggaran', Group: 'Pelanggaran Ketertiban' });
      };

      const handleDelete = (id) => {
        if (confirm('Yakin hapus kategori ini?')) {
          setKategoriList(kategoriList.filter(k => k.ID !== id));
        }
      };

      const handleSave = async () => {
        if (!password) return alert('Masukkan password!');
        setSaving(true);
        try {
          const res = await apiCall('SAVE_KATEGORI', { password, data: kategoriList });
          if (res.success) {
            alert('Berhasil disimpan!');
            setShowModal(false);
            setPassword('');
            setMasterData({ ...masterData, kategori: kategoriList });
          } else {
            alert(res.message);
          }
        } catch (e) {
          alert('Error menyimpan data');
        }
        setSaving(false);
      };

      return (
        <div className="space-y-6 animate-[fade-in_0.3s_ease-out] pb-20">
          <div className="bg-white rounded-[2rem] p-6 sm:p-8 shadow-sm border border-slate-200 relative overflow-hidden">
            <div className="absolute top-0 right-0 w-64 h-64 bg-slate-50 rounded-full blur-3xl -mr-20 -mt-20 opacity-50 pointer-events-none"></div>
            <h2 className="text-2xl font-black text-slate-800 mb-2 relative z-10">Pengaturan Poin & Kategori</h2>
            <p className="text-slate-500 mb-6 relative z-10">Kelola daftar apresiasi dan pelanggaran sesuai buku saku.</p>

            <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 mb-6 flex flex-wrap gap-4 items-end relative z-10">
              <div className="flex-1 min-w-[200px]">
                <label className="block text-xs font-bold text-slate-500 mb-1">Nama Kategori</label>
                <input type="text" value={newKat.NamaKategori} onChange={e => setNewKat({ ...newKat, NamaKategori: e.target.value })} className="w-full bg-white border border-slate-300 rounded-lg px-4 py-2 text-slate-700 outline-none focus:border-blue-500" placeholder="Cth: Telat masuk kelas" />
              </div>
              <div className="w-24">
                <label className="block text-xs font-bold text-slate-500 mb-1">Poin</label>
                <input type="number" value={newKat.Poin} onChange={e => setNewKat({ ...newKat, Poin: e.target.value })} className="w-full bg-white border border-slate-300 rounded-lg px-4 py-2 text-slate-700 outline-none focus:border-blue-500" placeholder="10" />
              </div>
              <div className="w-40">

                  <h3 className="font-black text-rose-700"><i className="fa-solid fa-triangle-exclamation mr-2"></i> Daftar Pelanggaran</h3>

                <div className="overflow-y-auto flex-1">
                  <table className="w-full text-left border-collapse">
                    <thead className="sticky top-0 bg-white z-10 shadow-sm text-xs text-slate-500">
                      <tr><th className="px-4 py-2">Uraian</th><th className="px-4 py-2 w-16 text-center">Poin</th><th className="px-4 py-2 w-12 text-center"></th></tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100">
                      {kategoriList.filter(k => k.Jenis === 'Pelanggaran').map((k, idx) => (
                        <tr key={k.ID} className="hover:bg-rose-50/50">
                          <td className="px-4 py-2 text-sm text-slate-700"><span className="text-rose-500 font-bold mr-2">{idx + 1}.</span> {k.NamaKategori}</td>

                <button onClick={() => setShowModal(false)} className="absolute top-5 right-5 text-slate-400 hover:text-slate-600"><i className="fa-solid fa-xmark fa-xl"></i></button>
                <div className="text-center mb-6">
                  <div className="w-20 h-20 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-5 shadow-inner"><i className="fa-solid fa-lock text-3xl"></i></div>
                  <h3 className="text-2xl font-black text-slate-800">Otorisasi Admin</h3>

                <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="Password" autoFocus className="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 text-slate-800 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20 text-center text-xl tracking-widest font-bold mb-6 transition-all" />
                <button onClick={handleSave} disabled={saving} className="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl hover:bg-blue-700 shadow-lg shadow-blue-600/30 transition-all disabled:opacity-70 text-lg">

    }

    function StudentSelector({ students, onSelect }) {
      const [filterKelas, setFilterKelas] = useState('');
      const [searchNama, setSearchNama] = useState('');

      const uniqueClasses = useMemo(() => {
        const setCls = new Set();
        students.forEach(s => { if (s.Kelas) setCls.add(s.Kelas); });
        return Array.from(setCls).filter(Boolean).sort((a, b) => String(a).localeCompare(String(b), undefined, { numeric: true, sensitivity: 'base' }));
      }, [students]);

      const filtered = useMemo(() => {
        let f = students;
        if (filterKelas) f = f.filter(s => s.Kelas === filterKelas);
        if (searchNama) {
          const lower = searchNama.toLowerCase();
          f = f.filter(s => s.Nama.toLowerCase().includes(lower) || s.NISN.includes(lower));
        }
        return f.slice(0, 100);
      }, [students, filterKelas, searchNama]);

      return (
        <div>
          <p className="text-sm text-slate-500 mb-5">Pilih kelas dari *dropdown* di bawah, lalu cukup <b>sentuh/klik nama murid</b> yang akan dicatat. Tidak perlu mengetik!</p>

          <div className="flex flex-col sm:flex-row gap-3 mb-5">
            <div className="flex-1 relative">
              <i className="fa-solid fa-filter absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
              <select
                className="w-full pl-10 pr-4 py-3 rounded-xl bg-slate-50 border-2 border-slate-200 text-slate-700 font-bold focus:border-blue-500 focus:outline-none appearance-none cursor-pointer"
                value={filterKelas} onChange={e => setFilterKelas(e.target.value)}
              >
                <option value="">Semua Kelas (Filter by Kelas)</option>
                {uniqueClasses.map((c, i, arr) => {
                  const prefix = c.split(' ')[0];
                  const prevPrefix = i > 0 ? arr[i - 1].split(' ')[0] : null;
                  const bg = prefix === 'X' ? 'bg-blue-50 text-blue-900' : prefix === 'XI' ? 'bg-emerald-50 text-emerald-900' : 'bg-amber-50 text-amber-900';
                  return (
                    <React.Fragment key={c}>
                      {prefix !== prevPrefix && <option disabled className="bg-slate-200 text-slate-800 font-black text-center">-- KELAS {prefix} --</option>}
                      <option value={c} className={bg}>Kelas {c}</option>
                    </React.Fragment>
                  );
                })}
              </select>
            </div>
            <div className="flex-1 relative">
              <i className="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
              <input
                type="text" placeholder="Atau cari nama (Opsional)..."
                className="w-full pl-10 pr-4 py-3 rounded-xl bg-slate-50 border-2 border-slate-200 text-slate-700 focus:border-blue-500 focus:outline-none"
                value={searchNama} onChange={e => setSearchNama(e.target.value)}
              />
            </div>
          </div>

          <div className="bg-slate-100 p-4 rounded-2xl border border-slate-200 min-h-[250px]">
            {filtered.length === 0 ? (
              <div className="text-center py-10 text-slate-400 font-medium">Tidak ada siswa yang sesuai kriteria pencarian.</div>
            ) : (
              <div className="flex flex-wrap gap-2 max-h-[300px] overflow-y-auto pr-2">
                {filtered.map(s => (
                  <button
                    key={s.NISN} onClick={() => onSelect(s)}
                    className="px-4 py-2.5 rounded-xl text-sm font-bold border-2 transition-all flex flex-col items-start bg-white border-slate-200 text-slate-600 hover:border-slate-300 hover:shadow-sm hover:bg-blue-50 text-left"
                  >
                    <span>{s.Nama}</span>
                    <span className="text-[10px] font-mono mt-0.5 text-slate-400">NISN: {s.NISN} &bull; {s.Kelas}</span>
                  </button>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }


    // --- DASHBOARD ADMIN ---
    function DashboardAdmin({ user }) {
      const [masterData, setMasterData] = useState({ siswa: [], kategori: [] });
      const [loading, setLoading] = useState(true);
      const [activeMenu, setActiveMenu] = useState(user.role === 'GTK' ? 'masal' : 'overview'); // 'overview' | 'masal' | 'individu' | 'rekap' | 'pembinaan'
      const [submitting, setSubmitting] = useState(false);

      const [selectedSiswa, setSelectedSiswa] = useState(null);
      const [cartIndividu, setCartIndividu] = useState([]);
      const [searchKategoriIndividu, setSearchKategoriIndividu] = useState('');
      const [individuJenisTab, setIndividuJenisTab] = useState('Pelanggaran');
      const [selectedKategoriMasal, setSelectedKategoriMasal] = useState(null);
      const [pinnedNames, setPinnedNames] = useState(() => JSON.parse(localStorage.getItem('pinnedKategoriNames')) || []);
      const [showPinModal, setShowPinModal] = useState(false);
      const [searchPinModal, setSearchPinModal] = useState('');
      const [searchKategoriMasal, setSearchKategoriMasal] = useState('');
      const [masalJenisTab, setMasalJenisTab] = useState('Pelanggaran');
      const [cartMasalSiswa, setCartMasalSiswa] = useState([]);
      const [filterKelas, setFilterKelas] = useState('');
      const [searchNama, setSearchNama] = useState('');

      const [rekapData, setRekapData] = useState([]);
      const [filterRekapNama, setFilterRekapNama] = useState('');
      const [filterRekapKelas, setFilterRekapKelas] = useState('');
      const [filterRekapKategori, setFilterRekapKategori] = useState('Semua');
      const [filterRekapDateStart, setFilterRekapDateStart] = useState('');
      const [filterRekapDateEnd, setFilterRekapDateEnd] = useState('');
      const [focusedStudentNama, setFocusedStudentNama] = useState(null);
      const [criticalStudents, setCriticalStudents] = useState([]);

      const fetchRekap = () => {
        apiCall('GET_ALL_RECORDS', {}).then(res => {
          if (res.success) setRekapData(res.data);
        });
      };

      const fetchCriticalStudents = () => {
        apiCall('GET_CRITICAL_STUDENTS', {}).then(res => {
          if (res.success) setCriticalStudents(res.data);
        });
      };

      const handleRefresh = (e) => {
        const icon = e.currentTarget.querySelector('i');
        if (icon) icon.classList.add('animate-[spin_0.5s_linear_infinite]');
        fetchRekap();
        fetchCriticalStudents();
        setTimeout(() => {
          if (icon) icon.classList.remove('animate-[spin_0.5s_linear_infinite]');
        }, 500);
      };

      useEffect(() => {
        apiCall('GET_MASTER_DATA', {}).then(res => {
          if (res.success) {
            setMasterData({ siswa: res.siswa || [], kategori: res.kategori || [] });
            const terlambat = (res.kategori || []).find(k => k.NamaKategori?.toLowerCase().includes('terlambat'));
            if (terlambat) setSelectedKategoriMasal(terlambat);
          }
          setLoading(false);
        }).catch(() => setLoading(false));
        fetchRekap();
        fetchCriticalStudents();
      }, []);

      // Saat pindah ke tab rekap, fetch ulang
      useEffect(() => {
        if (activeMenu === 'rekap') fetchRekap();
      }, [activeMenu]);

      const groupedKategori = useMemo(() => {
        const groups = { 'Apresiasi Karakter': [], 'Pelanggaran Ketertiban': [] };
        const sorted = [...masterData.kategori].sort((a, b) => Math.abs(parseInt(a.Poin)) - Math.abs(parseInt(b.Poin)));
        sorted.forEach(k => {
          const g = k.Group || 'Lainnya';
          if (!groups[g]) groups[g] = [];
          groups[g].push(k);
        });
        Object.keys(groups).forEach(key => { if (groups[key].length === 0) delete groups[key]; });
        return groups;
      }, [masterData.kategori]);



      const uniqueClasses = useMemo(() => {
        const clsSet = new Set();
        masterData.siswa.forEach(s => { if (s.Kelas) clsSet.add(s.Kelas) });
        rekapData.forEach(r => { if (r.kelas) clsSet.add(r.kelas) });
        return Array.from(clsSet).filter(Boolean).sort((a, b) => String(a).localeCompare(String(b), undefined, { numeric: true, sensitivity: 'base' }));
      }, [masterData.siswa, rekapData]);

      const filteredRekapData = useMemo(() => {
        let data = [...rekapData];
        if (filterRekapNama) data = data.filter(d => d.nama.toLowerCase().includes(filterRekapNama.toLowerCase()));
        if (filterRekapKelas) data = data.filter(d => d.kelas === filterRekapKelas);
        if (filterRekapKategori !== 'Semua') data = data.filter(d => d.jenis === filterRekapKategori);
        if (filterRekapDateStart) {
          const start = new Date(filterRekapDateStart).getTime();
          data = data.filter(d => d.tanggal && new Date(d.tanggal).getTime() >= start);
        }
        if (filterRekapDateEnd) {
          const end = new Date(filterRekapDateEnd).getTime();
          data = data.filter(d => d.tanggal && new Date(d.tanggal).getTime() <= end);
        }
        return data;
      }, [rekapData, filterRekapNama, filterRekapKelas, filterRekapKategori, filterRekapDateStart, filterRekapDateEnd]);

      const { totalPrestasi, totalPelanggaran, criticalAlert } = useMemo(() => {
        let tp = 0;
        let tpl = 0;
        let cAlert = false;

        const dataToSum = focusedStudentNama
          ? rekapData.filter(d => d.nama === focusedStudentNama)
          : filteredRekapData;

        dataToSum.forEach(d => {
          const p = Math.abs(parseInt(d.poin) || 0);
          if (d.jenis === 'Prestasi') tp += p;
          else if (d.jenis === 'Pelanggaran') tpl += p;
        });
        if ((filterRekapNama || focusedStudentNama) && Math.max(0, tpl - tp) >= 300) cAlert = true;
        return { totalPrestasi: tp, totalPelanggaran: tpl, criticalAlert: cAlert };
      }, [filteredRekapData, filterRekapNama, focusedStudentNama, rekapData]);

      const availableStudentsForMasal = useMemo(() => {
        let filtered = masterData.siswa;
        if (filterKelas) filtered = filtered.filter(s => s.Kelas === filterKelas);
        if (searchNama) {
          const lower = searchNama.toLowerCase();
          filtered = filtered.filter(s => s.Nama.toLowerCase().includes(lower) || s.NISN.includes(lower));
        }
        return filtered.slice(0, 100);
      }, [masterData.siswa, filterKelas, searchNama]);

      const toggleStudentMasal = (s) => {
        const isSelected = cartMasalSiswa.find(x => x.NISN === s.NISN);
        if (isSelected) {
          setCartMasalSiswa(cartMasalSiswa.filter(x => x.NISN !== s.NISN));
        } else {
          setCartMasalSiswa([{ ...s, uniqueId: Date.now() }, ...cartMasalSiswa]);
        }
      }

      const submitMasal = async () => {
        if (cartMasalSiswa.length === 0 || !selectedKategoriMasal) return;
        setSubmitting(true);
        const dateStr = new Date().toISOString().split('T')[0];
        const timeStr = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
        const records = cartMasalSiswa.map(s => ({
          namaSiswa: s.Nama,
          kelas: s.Kelas,
          namaKategori: selectedKategoriMasal.NamaKategori,
          jenis: selectedKategoriMasal.Jenis,
          poin: selectedKategoriMasal.Poin,
          petugas: user
        }));
        const payload = { date: dateStr, time: timeStr, records };
        const res = await apiCall('SUBMIT_RECORDS', payload);
        setSubmitting(false);
        if (res.success) {
          alert(res.message);
          setCartMasalSiswa([]);
          fetchCriticalStudents();
          fetchRekap();
        } else alert(res.message);
      }

      const addToCart = (k) => { setCartIndividu([...cartIndividu, { ...k, uniqueId: Date.now() + Math.random() }]); };

      const submitIndividu = async () => {
        if (!selectedSiswa || cartIndividu.length === 0) return;
        setSubmitting(true);
        const dateStr = new Date().toISOString().split('T')[0];
        const timeStr = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
        const records = cartIndividu.map(c => ({
          namaSiswa: selectedSiswa.Nama,
          kelas: selectedSiswa.Kelas,
          namaKategori: c.NamaKategori,
          jenis: c.Jenis,
          poin: c.Poin,
          petugas: user
        }));
        const payload = { date: dateStr, time: timeStr, records };

        const res = await apiCall('SUBMIT_RECORDS', payload);
        setSubmitting(false);
        if (res.success) {
          alert(res.message);
          setSelectedSiswa(null);
          setCartIndividu([]);
          fetchCriticalStudents();
          fetchRekap();
        } else alert(res.message);
      };

      const handleTandaiDibina = async (s) => {
        if (!window.confirm(`Tandai ${s.Nama} telah dibina? Peringatan untuk murid ini akan disembunyikan sampai ada pelanggaran baru (tanpa mereset poin).`)) return;
        setSubmitting(true);
        const dateStr = new Date().toISOString().split('T')[0];
        const timeStr = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', hour12: false });

        const payload = {
          date: dateStr,
          time: timeStr,
          records: [{
            namaSiswa: s.Nama,
            kelas: s.Kelas,
            namaKategori: "Telah Dibina",
            jenis: "Pembinaan",
            poin: 0,
            petugas: user.nip || 'Admin'
          }]
        };
        const res = await apiCall('SUBMIT_RECORDS', payload);
        setSubmitting(false);
        if (res.success) {
          alert(`Berhasil menandai ${s.Nama} telah dibina.`);
          fetchCriticalStudents();
          fetchRekap();
        } else {
          alert(res.message);
        }
      };

      const visibleCriticalStudents = useMemo(() => {
        return criticalStudents.filter(s => {
          const studentRecords = rekapData.filter(r => r.nama === s.Nama);
          const getJenis = r => (r.jenis || '').trim().toLowerCase();

          const lastPelanggaranIdx = studentRecords.findIndex(r => getJenis(r) === 'pelanggaran');
          const lastPembinaanIdx = studentRecords.findIndex(r => getJenis(r) === 'pembinaan');

          if (lastPembinaanIdx === -1) return true; // Belum pernah dibina -> TAMPILKAN
          if (lastPelanggaranIdx === -1) return true; // Fallback fail-safe -> TAMPILKAN

          return lastPelanggaranIdx < lastPembinaanIdx; // Tampilkan jika pelanggaran lebih baru dari pembinaan
        });
      }, [criticalStudents, rekapData]);

      if (loading) return <div className="text-center py-20 text-blue-500 animate-pulse font-mono tracking-widest text-lg font-bold">NUJU MILARI DATABASE...</div>;

      let menuItems = [];
      if (user.role === 'GTK') {
        menuItems = [
          { id: 'masal', icon: 'fa-bolt', label: 'Input Massal', color: 'text-amber-500' },
          { id: 'individu', icon: 'fa-user-pen', label: 'Input Detail', color: 'text-blue-600' },
          { id: 'rekap', icon: 'fa-clipboard-list', label: 'Rekapitulasi', color: 'text-emerald-600' }
        ];
      } else {
        menuItems = [
          { id: 'overview', icon: 'fa-chart-pie', label: 'Dashboard', color: 'text-indigo-600' },
          { id: 'masal', icon: 'fa-bolt', label: 'Input Massal', color: 'text-amber-500' },
          { id: 'individu', icon: 'fa-user-pen', label: 'Input Detail', color: 'text-blue-600' },
          { id: 'rekap', icon: 'fa-clipboard-list', label: 'Rekapitulasi', color: 'text-emerald-600' },
          { id: 'pembinaan', icon: 'fa-shield-virus', label: 'Peringatan', color: 'text-red-600', badge: visibleCriticalStudents.length },
          { id: 'panduan', icon: 'fa-gear', label: 'Setting', color: 'text-purple-600' }
        ];
      }

      return (
        <div className="flex flex-col md:flex-row gap-6 animate-[fade-in_0.4s_ease-out] pb-20 md:pb-0">

          {/* SIDEBAR DESKTOP */}
          <div className="hidden md:flex flex-col w-64 flex-shrink-0 gap-2">
            <div className="bg-white rounded-[2rem] p-4 shadow-sm border border-slate-200 sticky top-24">
              <div className="text-center mb-6 pt-4">
                <div className="w-16 h-16 bg-blue-100 text-blue-700 rounded-2xl flex items-center justify-center mx-auto text-2xl font-black mb-3">{user.nama.charAt(0)}</div>
                <h3 className="font-bold text-slate-800">{user.nama}</h3>
                <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">{user.role}</p>
              </div>
              <nav className="flex flex-col gap-2">
                {menuItems.map(m => (
                  <button
                    key={m.id} onClick={() => setActiveMenu(m.id)}
                    className={`flex items-center gap-4 px-5 py-3.5 rounded-2xl transition-all font-bold text-sm ${activeMenu === m.id ? 'bg-slate-800 text-white shadow-lg shadow-slate-300 translate-x-1' : 'bg-transparent text-slate-500 hover:bg-slate-50 hover:text-slate-700'}`}
                  >
                    <i className={`fa-solid ${m.icon} w-5 text-center ${activeMenu === m.id ? 'text-white' : m.color}`}></i>
                    <span className="flex-1 text-left">{m.label}</span>

    // --- DASHBOARD SISWA (TETAP) ---
    function DashboardSiswa({ user }) {
      const [history, setHistory] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        apiCall('GET_SISWA_HISTORY', { nisn: user.nisn }).then(res => {
          if (res.success) setHistory(res.data || []);
          setLoading(false);
        }).catch(() => setLoading(false));
      }, []);

      const basePoin = 300;
      const totalPoin = history.reduce((acc, curr) => {
        const p = Math.abs(parseInt(curr.poin || curr.Poin || 0));
        if (curr.jenis === 'Prestasi' || curr.Jenis === 'Prestasi') return acc + p;
        if (curr.jenis === 'Pelanggaran' || curr.Jenis === 'Pelanggaran') return acc - p;
        return acc;
      }, basePoin);

      let statusPembinaan = "Aman (Teruskan Karakter Baikmu)"; let colorPembinaan = "text-green-700 bg-green-50 border-green-200"; let iconPembinaan = "fa-solid fa-circle-check";
      if (totalPoin <= 200 && totalPoin > 100) { statusPembinaan = "Perhatian: Segera temui Wali Kelas untuk Pembinaan."; colorPembinaan = "text-yellow-700 bg-yellow-50 border-yellow-200"; iconPembinaan = "fa-solid fa-triangle-exclamation"; }
      else if (totalPoin <= 100 && totalPoin > 50) { statusPembinaan = "Peringatan: Jadwal Pembinaan dengan Guru BK menanti."; colorPembinaan = "text-orange-700 bg-orange-50 border-orange-200"; iconPembinaan = "fa-solid fa-shield-virus"; }
      else if (totalPoin <= 50) { statusPembinaan = "Kritis: Pemanggilan Orang Tua (Surat SP)."; colorPembinaan = "text-red-700 bg-red-50 border-red-200"; iconPembinaan = "fa-solid fa-circle-xmark"; }

      if (loading) return <div className="text-center py-20 text-blue-500 font-bold">MEMUAT RAPOR KARAKTER...</div>;

      return (
        <div className="space-y-6 max-w-4xl mx-auto">
          <div className="bg-white rounded-[2rem] p-6 md:p-8 flex flex-col md:flex-row justify-between items-center gap-6 shadow-sm border border-slate-200">
            <div className="flex items-center gap-5">
              <div className="w-16 h-16 bg-blue-100 rounded-2xl flex items-center justify-center text-blue-600 text-3xl font-black">{user.nama.charAt(0)}</div>
              <div><h2 className="text-xl md:text-2xl font-extrabold text-slate-800">{user.nama}</h2><p className="text-slate-500 font-medium">{user.nisn} &bull; {user.kelas}</p></div>
            </div>
            <div className="bg-slate-50 p-5 rounded-2xl border border-slate-200 text-center min-w-[140px]">
              <p className="text-[10px] uppercase text-slate-500 mb-2 font-bold">Skor Karakter</p>
              <p className={`text-6xl font-black leading-none ${totalPoin >= 100 ? 'text-green-500' : 'text-red-500'}`}>{totalPoin}</p>
            </div>
          </div>
          <div className={`border p-5 rounded-2xl flex items-center gap-4 shadow-sm ${colorPembinaan}`}>
            <i className={`${iconPembinaan} text-3xl`}></i>
            <div><h4 className="font-bold text-xs uppercase mb-1">Status Tindak Lanjut</h4><p className="font-bold">{statusPembinaan}</p></div>
          </div>
          <div className="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-200">
            <h3 className="text-lg font-bold mb-4 text-slate-800 border-b pb-4"><i className="fa-solid fa-clock-rotate-left text-blue-600"></i> Riwayat Refleksi</h3>
            {history.length === 0 ? <p className="text-center py-10 text-slate-500">Belum ada riwayat tercatat.</p> : (
              <table className="w-full text-sm text-left"><thead className="bg-slate-50 text-slate-500 border-b"><tr><th className="px-5 py-3">Tanggal</th><th className="px-5 py-3">Keterangan</th><th className="px-5 py-3 text-center">Poin</th></tr></thead>
                <tbody className="divide-y divide-slate-100">{history.map((h, i) => <tr key={i}><td className="px-5 py-3 font-bold text-slate-800">{h.Tanggal}</td><td className="px-5 py-3 text-slate-600">{h.NamaKategori}</td><td className="px-5 py-3 text-center text-red-500 font-black">{h.Poin}</td></tr>)}</tbody></table>
            )}
          </div>
        </div>
      );
    }

    const style = document.createElement('style'); style.innerHTML = `@keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }`; document.head.appendChild(style);
    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
  </script>
</body>

</html>
